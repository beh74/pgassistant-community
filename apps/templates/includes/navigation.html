<style>
  .pga-topnav {
    position: sticky;
    top: 0;
    z-index: 1010;
    margin: .75rem 1rem 1rem;
    padding: .7rem .85rem;
    border: 1px solid rgba(148, 163, 184, .24);
    border-radius: 1.35rem;
    background:
      linear-gradient(135deg, rgba(255, 255, 255, .92), rgba(248, 250, 252, .82));
    box-shadow: 0 18px 42px rgba(15, 23, 42, .08);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .pga-topnav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    width: 100%;
  }

  .pga-topnav-left,
  .pga-topnav-right {
    display: flex;
    align-items: center;
    gap: .75rem;
    min-width: 0;
  }

  .pga-topnav-search {
    min-width: min(460px, 42vw);
  }

  .pga-topnav-search .input-group {
    border: 1px solid rgba(148, 163, 184, .25);
    border-radius: 999px;
    background: rgba(255, 255, 255, .9);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7);
    overflow: hidden;
  }

  .pga-topnav-search .input-group-text,
  .pga-topnav-search .form-control {
    border: 0;
    background: transparent;
  }

  .pga-topnav-search .input-group-text {
    color: #64748b;
    padding-left: 1rem;
    padding-right: .45rem;
  }

  .pga-topnav-search .form-control {
    min-height: 42px;
    color: #0f172a;
    font-weight: 600;
    font-size: .9rem;
  }

  .pga-topnav-search .form-control::placeholder {
    color: #94a3b8;
    font-weight: 600;
  }

  .pga-topnav-search .form-control:focus {
    box-shadow: none;
  }

  .pga-db-context {
    display: inline-flex;
    align-items: center;
    gap: .65rem;
    min-width: 0;
    max-width: 46vw;
    padding: .45rem .7rem .45rem .5rem;
    border: 1px solid rgba(20, 184, 166, .22);
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(236, 253, 245, .95), rgba(240, 249, 255, .85));
    color: #0f172a;
  }

  .pga-db-context-icon {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: 50%;
    background: linear-gradient(135deg, #14b8a6, #38bdf8);
    color: #fff;
    box-shadow: 0 8px 18px rgba(20, 184, 166, .26);
  }

  .pga-db-context-text {
    min-width: 0;
    display: flex;
    flex-direction: column;
    line-height: 1.05;
  }

  .pga-db-context-label {
    font-size: .66rem;
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: #0f766e;
  }

  .pga-db-context-value {
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: .84rem;
    font-weight: 800;
    color: #0f172a;
  }

  .pga-topnav-menu-btn {
    width: 42px;
    height: 42px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(99, 102, 241, .18);
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(79, 70, 229, .10), rgba(14, 165, 233, .10));
    color: #4338ca !important;
    box-shadow: 0 10px 24px rgba(79, 70, 229, .10);
  }

  .pga-topnav-menu-btn::after {
    display: none;
  }

  .pga-topnav-menu-btn:hover,
  .pga-topnav-menu-btn:focus {
    color: #1d4ed8 !important;
    background: linear-gradient(135deg, rgba(79, 70, 229, .16), rgba(14, 165, 233, .16));
  }

  .pga-topnav-dropdown {
    min-width: 260px;
    padding: .55rem;
    border: 1px solid rgba(148, 163, 184, .22);
    border-radius: 1rem;
    background: rgba(255, 255, 255, .96);
    box-shadow: 0 24px 52px rgba(15, 23, 42, .16);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .pga-topnav-dropdown .dropdown-item {
    display: flex;
    align-items: center;
    gap: .7rem;
    padding: .72rem .75rem;
    border-radius: .8rem;
    color: #334155;
    font-size: .9rem;
    font-weight: 700;
  }

  .pga-topnav-dropdown .dropdown-item:hover,
  .pga-topnav-dropdown .dropdown-item:focus {
    background: linear-gradient(135deg, rgba(59, 130, 246, .10), rgba(99, 102, 241, .08));
    color: #1d4ed8;
  }

  .pga-dropdown-icon {
    width: 32px;
    height: 32px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: .75rem;
    background: rgba(248, 250, 252, .95);
    color: #2563eb;
    border: 1px solid rgba(148, 163, 184, .18);
  }

  .pga-dropdown-section {
    padding: .35rem .75rem .2rem;
    font-size: .66rem;
    font-weight: 900;
    letter-spacing: .09em;
    text-transform: uppercase;
    color: #94a3b8;
  }

  .pga-topnav-dropdown .dropdown-divider {
    margin: .45rem .25rem;
    border-color: rgba(148, 163, 184, .18);
  }

  @media (max-width: 991.98px) {
    .pga-topnav {
      margin: .5rem .75rem .85rem;
      border-radius: 1.1rem;
    }

    .pga-topnav-search {
      min-width: 0;
      width: 100%;
    }

    .pga-topnav-left {
      flex: 1 1 auto;
    }

    .pga-db-context {
      display: none;
    }
  }

  @media (max-width: 575.98px) {
    .pga-topnav {
      padding: .55rem;
    }

    .pga-topnav-search .form-control {
      min-height: 38px;
      font-size: .85rem;
    }
  }
</style>

<nav class="navbar navbar-top navbar-expand navbar-dashboard pga-topnav" aria-label="Top navigation">
  <div class="container-fluid px-0">
    <div class="pga-topnav-inner" id="navbarSupportedContent">

      <div class="pga-topnav-left">
        <form class="navbar-search form-inline pga-topnav-search" id="navbar-search-main" action="/search.html" method="POST" role="search">
          <div class="input-group input-group-merge search-bar">
            <span class="input-group-text" id="topbar-addon" aria-hidden="true">
              <i class="bi bi-search"></i>
            </span>
            <input
              class="form-control"
              id="searchkey"
              name="searchkey"
              type="text"
              placeholder="Search query"
              aria-label="Search query"
            >
          </div>
        </form>
      </div>

      <div class="pga-topnav-right">
        {% if session['db_host'] %}
          <div class="pga-db-context d-none d-lg-inline-flex" title="{{ session['db_host'] }} : {{ session['db_name'] }}">
            <span class="pga-db-context-icon" aria-hidden="true">
              <i class="bi bi-database"></i>
            </span>
            <span class="pga-db-context-text">
              <span class="pga-db-context-label">Connected database</span>
              <span class="pga-db-context-value">
                {{ session['db_host'] }} : <strong>{{ session['db_name'] }}</strong>
              </span>
            </span>
          </div>
        {% endif %}

        <div class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle pga-topnav-menu-btn"
            href="#"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            aria-label="Open quick actions menu"
          >
            <i class="bi bi-gear"></i>
          </a>

          <div class="dropdown-menu dropdown-menu-end mt-2 pga-topnav-dropdown">
            <div class="pga-dropdown-section">Navigation</div>

            <a class="dropdown-item" href="/dashboard.html">
              <span class="pga-dropdown-icon"><i class="bi bi-pie-chart-fill"></i></span>
              Dashboard
            </a>

            <a class="dropdown-item" href="/llm.html">
              <span class="pga-dropdown-icon"><i class="bi bi-cpu"></i></span>
              LLM Settings
            </a>

            <a class="dropdown-item" href="/lint.html">
              <span class="pga-dropdown-icon"><i class="bi bi-code-slash"></i></span>
              Format SQL
            </a>

            <div role="separator" class="dropdown-divider"></div>
            <div class="pga-dropdown-section">Personal tools</div>

            <a class="dropdown-item" href="/myqueries.html">
              <span class="pga-dropdown-icon"><i class="bi bi-journal-bookmark"></i></span>
              My queries
            </a>

            <a class="dropdown-item" href="/pgtune.html">
              <span class="pga-dropdown-icon"><i class="bi bi-sliders"></i></span>
              PG Tune
            </a>
          </div>
        </div>
      </div>

    </div>
  </div>
</nav>
