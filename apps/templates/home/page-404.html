{% extends "layouts/base-fullscreen.html" %}

{% block title %} 404 Not Found {% endblock %}

{% block content %}

<main>
  <section class="vh-100 d-flex align-items-center justify-content-center">
    <div class="container text-center">

      <div class="card border-0 shadow p-5 mx-auto" style="max-width: 600px;">
        
        <!-- Icon -->
        <div class="mb-4">
          <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5"
               viewBox="0 0 24 24" style="color: #dc3545;">
            <circle cx="12" cy="12" r="10"></circle>
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M9 9l6 6M15 9l-6 6"></path>
          </svg>
        </div>

        <!-- Title -->
        <h1 class="h3 mb-2">Page not found</h1>

        <!-- Message -->
        <p class="text-muted mb-4">
          The page you are looking for does not exist or has been moved.
        </p>

        <!-- Actions -->
        <div class="d-flex justify-content-center gap-2 flex-wrap">
          
          <button onclick="goBack()"
                  class="btn btn-outline-secondary d-inline-flex align-items-center">
            <svg class="icon icon-xs me-2" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd"
                    d="M7.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l2.293 2.293a1 1 0 010 1.414z"
                    clip-rule="evenodd"></path>
            </svg>
            Go back
          </button>

          <a href="/database.html"
             class="btn btn-primary d-inline-flex align-items-center">
            Home
          </a>

        </div>

      </div>

    </div>
  </section>
</main>

{% endblock content %}

{% block javascripts %}
<script>
function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "/database.html";
  }
}
</script>
{% endblock javascripts %}
